services:
  postgresql:
    # postgis/postgis:17-3.5 ships Postgres 17 + PostGIS 3.5 extensions so that
    # the gis module's wbs_polygons geometry column is resolvable without a
    # separate extension installer step. Bipros only uses PostGIS for polygons
    # right now but the same image works for future raster / topology needs.
    image: postgis/postgis:17-3.5
    container_name: bipros-postgres
    environment:
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: bipros
      POSTGRES_USER: postgres
      POSTGRES_INITDB_ARGS: ""
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bipros-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bipros.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgresql:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: bipros-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # S3-compatible object store for satellite raster tiles. Prod can point the
  # storage adapter at AWS S3; dev uses MinIO so `docker compose up -d` gives a
  # working pipeline without AWS credentials.
  minio:
    image: minio/minio:latest
    container_name: bipros-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ClickHouse — analytical store for the GenAI Analytics Assistant (Phase 1+).
  # Native port 9000 is intentionally not exposed; MinIO already owns 9000/9001
  # on the host and JDBC over HTTP (8123) is enough for everything we do.
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: bipros-clickhouse
    ports:
      - "8123:8123"
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse-init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_USER: bipros
      CLICKHOUSE_PASSWORD: bipros_dev
      CLICKHOUSE_DB: bipros_analytics
      # Grants CREATE USER / CREATE ROLE / GRANT to the bipros user so the
      # init SQL can provision the bipros_reader read-only account.
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clickhouse_data:

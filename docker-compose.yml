services:
  postgresql:
    image: postgres:17-alpine
    container_name: bipros-postgres
    environment:
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: bipros
      POSTGRES_USER: postgres
      POSTGRES_INITDB_ARGS: ""
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bipros-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bipros.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgresql:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: bipros-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

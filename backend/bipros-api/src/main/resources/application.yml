spring:
  application:
    name: bipros-eppm

  sql:
    init:
      mode: never

  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/bipros
    username: bipros
    password: bipros_dev
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  liquibase:
    enabled: false  # Enable when migration files are ready
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: 8080
  servlet:
    context-path: /

# JWT Configuration
bipros:
  security:
    jwt:
      secret: bipros-dev-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256
      access-token-expiration: 3600000   # 1 hour
      refresh-token-expiration: 86400000 # 24 hours

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.bipros: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  liquibase:
    enabled: true

logging:
  level:
    com.bipros: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN

spring:
  profiles:
    active: dev
  application:
    name: bipros-eppm

  sql:
    init:
      mode: never

  datasource:
    # Env-overrides make this file the single source of truth for local/dev; prod just sets
    # DATABASE_URL / DB_USERNAME / DB_PASSWORD in the orchestrator secrets.
    url: ${DATABASE_URL:jdbc:postgresql://127.0.0.1:5432/bipros}
    username: ${DB_USERNAME:bipros}
    password: ${DB_PASSWORD:bipros_dev}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: create-drop   # dev profile rebuilds schema clean each boot; seeders are authoritative
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  liquibase:
    enabled: false  # Enable when migration files are ready
    change-log: classpath:db/changelog/db.changelog-master.yaml

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    # Required for RoleAwareViewAdvice — when a @JsonView is active, fields without an explicit
    # view marker stay visible. Only fields explicitly annotated with @JsonView(FinanceConfidential)
    # etc. get filtered. Without this, every existing DTO would lose its unannotated fields.
    mapper:
      default-view-inclusion: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 60MB

  # Redis — used by the analytics assistant for per-user rate limiting (Phase 4).
  # Brought up by docker-compose alongside Postgres.
  #
  # repositories.enabled=false is REQUIRED. We use Redis only as a fast
  # key-value store via StringRedisTemplate + a Lua script (no @RedisHash
  # entities). Without this, Spring Data sees both JPA and Redis modules and
  # switches to "strict repository configuration mode" — which mis-classifies
  # every JpaRepository as a candidate Redis repository and fails to wire
  # EntityManagerFactory into UserRepository / CustomUserDetailsService at boot.
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      repositories:
        enabled: false

server:
  port: 8080
  servlet:
    context-path: /

# JWT Configuration — set JWT_SECRET in prod env to a 32+ byte random string.
bipros:
  security:
    jwt:
      secret: ${JWT_SECRET:bipros-dev-secret-key-must-be-at-least-256-bits-long-for-hmac-sha256}
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}
      refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:86400000}
  cors:
    # Comma-separated list of allowed frontend origins. Override via CORS_ALLOWED_ORIGINS.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

  # Document binary storage — local filesystem; point at shared volume in prod or swap to S3
  document:
    storage:
      path: ./storage/documents
      max-file-size: 52428800   # 50 MB in bytes; must match spring.servlet.multipart.max-file-size

  # Contract attachment binary storage — same filesystem pattern as documents
  contract:
    storage:
      path: ./storage/contracts
      max-file-size: 52428800   # 50 MB in bytes; must match spring.servlet.multipart.max-file-size

  # Error responses — include exception class + message + top stack frame in 500 bodies.
  # Default is OFF so production never leaks internals; default profile (dev) turns it ON below.
  errors:
    include-detail: true

  # Satellite raster storage. MinIO in dev (docker-compose.yml), AWS S3 in prod
  # via the same config keys (change endpoint + credentials).
  storage:
    kind: s3
    s3:
      endpoint: http://localhost:9000
      access-key: minio
      secret-key: minio123
      region: us-east-1
      bucket: sentinel-tiles
    local:
      root: ./data/satellite

  # Satellite imagery providers. Dev defaults keep Sentinel Hub disabled so the
  # app boots without a Copernicus account. Set the three env vars and flip
  # enabled=true to activate ingestion.
  satellite:
    ingestion:
      enabled: false
      cron: "0 0 3 * * *"
      max-days-lookback: 7
    sentinel-hub:
      enabled: true
      # IMPORTANT: CDSE (Copernicus Data Space Ecosystem) and legacy Sentinel Hub
      # are independent services with independent credentials:
      #   CDSE    — free tier, signup at https://dataspace.copernicus.eu,
      #             API host: https://sh.dataspace.copernicus.eu,
      #             OAuth:    https://identity.dataspace.copernicus.eu/auth/realms/CDSE/protocol/openid-connect/token
      #   Legacy  — paid/trial, signup at https://www.sentinel-hub.com,
      #             API host: https://services.sentinel-hub.com,
      #             OAuth:    https://services.sentinel-hub.com/oauth/token
      # Pick the matching pair; pasting CDSE credentials at the legacy host
      # (or vice-versa) yields 401 "Please provide a valid access token" at
      # the catalog/process step even after OAuth succeeds.
      base-url: https://sh.dataspace.copernicus.eu
      token-url: https://identity.dataspace.copernicus.eu/auth/realms/CDSE/protocol/openid-connect/token
      client-id: ${SENTINEL_HUB_CLIENT_ID:}
      client-secret: ${SENTINEL_HUB_CLIENT_SECRET:}

  # AI progress analyzer — Anthropic Claude vision. Disabled by default so
  # manual ingestion runs don't silently spend tokens. Flip provider to
  # claude-vision and set ANTHROPIC_API_KEY to enable.
  ai:
    progress-analyzer:
      # Flip to "claude-vision" to enable the analyzer; requires ANTHROPIC_API_KEY.
      # Set to "none" to skip analysis (ingestion still fetches + stores imagery).
      provider: claude-vision
      anthropic-api-key: ${ANTHROPIC_API_KEY:}
      model: claude-sonnet-4-6
      max-tokens: 512
      request-timeout-seconds: 30

  # GenAI Analytics Assistant — v1 GA (Phase 4 shipped). Defaults to on.
  # The flag is retained as an emergency kill switch: set
  # BIPROS_ANALYTICS_ASSISTANT_ENABLED=false to disable the assistant without a
  # redeploy (also disables /v1/llm-providers and the LLM adapter beans).
  analytics:
    assistant:
      enabled: ${BIPROS_ANALYTICS_ASSISTANT_ENABLED:true}
      # Maximum number of tool-call rounds per user query before the orchestrator
      # gives up. Bounds runaway loops where the LLM keeps invoking tools without
      # converging on an answer.
      max-tool-rounds: ${BIPROS_ANALYTICS_MAX_TOOL_ROUNDS:3}
      max-output-tokens: ${BIPROS_ANALYTICS_MAX_OUTPUT_TOKENS:8000}
      timeout-seconds: ${BIPROS_ANALYTICS_TIMEOUT_SECONDS:60}
      history-turns: ${BIPROS_ANALYTICS_HISTORY_TURNS:5}
    sql:
      max-rows: ${BIPROS_ANALYTICS_SQL_MAX_ROWS:10000}
      max-execution-time: ${BIPROS_ANALYTICS_SQL_MAX_EXEC_SECONDS:10}
    llm:
      # AES-256 KEK as 64 hex chars. In dev a deterministic fallback is used with
      # a warning. In prod this MUST be set.
      kek-hex: ${BIPROS_LLM_KEK_HEX:}
    clickhouse:
      url: ${BIPROS_CLICKHOUSE_URL:jdbc:clickhouse://localhost:8123/bipros_analytics}
      username: ${BIPROS_CLICKHOUSE_USER:bipros}
      password: ${BIPROS_CLICKHOUSE_PASSWORD:bipros_dev}
      reader-username: ${BIPROS_CLICKHOUSE_READER_USER:bipros_reader}
      reader-password: ${BIPROS_CLICKHOUSE_READER_PASSWORD:bipros_reader_dev}
    # Phase 1 ETL — Postgres → ClickHouse incremental sync. Default-on so the local stack
    # populates the analytical store automatically; flip to false if a deploy needs to skip it.
    etl:
      enabled: ${BIPROS_ETL_ENABLED:true}
      page-size: ${BIPROS_ETL_PAGE_SIZE:5000}
      schedule-cron: ${BIPROS_ETL_CRON:0 */10 * * * *}
    # Phase 4 — per-user rate limit on POST /v1/analytics/query. Backed by Redis;
    # rejected calls return HTTP 429 with a Retry-After header and write a
    # RATE_LIMITED row to analytics_audit_log so the admin health page sees abuse.
    # Set enabled=false to disable the limiter entirely (the bean is not created).
    rate-limit:
      enabled: ${BIPROS_ANALYTICS_RATE_LIMIT_ENABLED:true}
      queries-per-hour: ${BIPROS_ANALYTICS_RATE_LIMIT_QPH:60}
      redis-key-prefix: "analytics:rl"

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.bipros: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.security: DEBUG

---
# Production profile — activate with SPRING_PROFILES_ACTIVE=prod.
# Required env vars in prod:
#   DATABASE_URL / DB_USERNAME / DB_PASSWORD
#   JWT_SECRET            — 32+ byte random string (never reuse the dev default)
#   CORS_ALLOWED_ORIGINS  — comma-separated list of frontend origins
# Optional: ANTHROPIC_API_KEY, SENTINEL_HUB_CLIENT_ID, SENTINEL_HUB_CLIENT_SECRET.
spring:
  config:
    activate:
      on-profile: prod

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  liquibase:
    enabled: true

bipros:
  errors:
    include-detail: false  # hide stack traces from clients in prod

logging:
  level:
    com.bipros: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN

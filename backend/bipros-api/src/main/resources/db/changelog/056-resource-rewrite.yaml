              - column: { name: first_name,            type: VARCHAR(80) }
              - column: { name: last_name,             type: VARCHAR(80) }
              - column: { name: full_name,             type: VARCHAR(160) }
              - column: { name: category,              type: VARCHAR(30) }
              - column: { name: sub_category,          type: VARCHAR(60) }
              - column: { name: date_of_birth,         type: DATE }
              - column: { name: gender,                type: VARCHAR(20) }
              - column: { name: nationality,           type: VARCHAR(60) }
              - column: { name: contact_number,        type: VARCHAR(30) }
              - column: { name: email,                 type: VARCHAR(120) }
              - column: { name: address,               type: VARCHAR(500) }
              - column: { name: emergency_contact,     type: VARCHAR(120) }
              - column: { name: photo_url,             type: VARCHAR(500) }
              - column: { name: employment_type,       type: VARCHAR(30) }
              - column: { name: designation,           type: VARCHAR(100) }
              - column: { name: department,            type: VARCHAR(100) }
              - column: { name: joining_date,          type: DATE }
              - column: { name: exit_date,             type: DATE }
              - column: { name: reporting_manager_id,  type: UUID }
              - column: { name: company_name,          type: VARCHAR(120) }
              - column: { name: work_location,         type: VARCHAR(120) }
              - column: { name: created_at,            type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: updated_at,            type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: created_by,            type: VARCHAR(255) }
              - column: { name: updated_by,            type: VARCHAR(255) }
              - column: { name: version,               type: BIGINT }
        - addForeignKeyConstraint:
            baseTableSchemaName: resource
            baseTableName: manpower_master
            baseColumnNames: resource_id
            referencedTableSchemaName: resource
            referencedTableName: resources
            referencedColumnNames: id
            constraintName: fk_manpower_master_resource
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableSchemaName: resource
            baseTableName: manpower_master
            baseColumnNames: reporting_manager_id
            referencedTableSchemaName: resource
            referencedTableName: resources
            referencedColumnNames: id
            constraintName: fk_manpower_master_manager
        - createIndex:
            schemaName: resource
            tableName: manpower_master
            indexName: idx_manpower_employee_code
            columns: [{ column: { name: employee_code } }]
        - createIndex:
            schemaName: resource
            tableName: manpower_master
            indexName: idx_manpower_designation
            columns: [{ column: { name: designation } }]

  - changeSet:

              - column: { name: category,           type: VARCHAR(80) }
              - column: { name: sub_category,       type: VARCHAR(80) }
              - column: { name: material_grade,     type: VARCHAR(80) }
              - column: { name: specification,      type: VARCHAR(500) }
              - column: { name: brand,              type: VARCHAR(80) }
              - column: { name: manufacturer_name,  type: VARCHAR(120) }
              - column: { name: standard_code,      type: VARCHAR(80) }
              - column: { name: quality_class,      type: VARCHAR(60) }
              - column: { name: base_unit,          type: VARCHAR(30) }
              - column: { name: conversion_factor,  type: DECIMAL(15, 6) }
              - column: { name: alternate_units,    type: JSONB }
              - column: { name: density,            type: DECIMAL(10, 4) }
              - column: { name: created_at,         type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: updated_at,         type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: created_by,         type: VARCHAR(255) }
              - column: { name: updated_by,         type: VARCHAR(255) }
              - column: { name: version,            type: BIGINT }
        - addForeignKeyConstraint:
            baseTableSchemaName: resource
            baseTableName: resource_material_details
            baseColumnNames: resource_id
            referencedTableSchemaName: resource
            referencedTableName: resources
            referencedColumnNames: id
            constraintName: fk_material_details_resource
            onDelete: CASCADE

  # ── Manpower (6 tables, full HRIS) ─────────────────────────────────────────

  - changeSet:
      id: 056-create-manpower-master
      author: bipros
      changes:
        - createTable:
            schemaName: resource

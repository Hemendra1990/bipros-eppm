databaseChangeLog:
  # ---------------------------------------------------------------------------
  # Resource subsystem rewrite (clean slate).
  #
  # Replaces the previous Type → Role → Resource shape (resource_type_defs +
  # resource_roles + resources + resource_role_assignments) with:
  #   resource_types       — three system rows (LABOR / EQUIPMENT / MATERIAL)
  #   resource_roles       — what the resource does (Bulldozer Operator, Cement)
  #   resources            — slim base; FK directly to a single role
  #   per-type detail tables — equipment / material / 6 manpower tables
  #
  # Preserves resource_assignments, resource_rates, resource_curves with the
  # same column names so EVM/Cost/Baseline cross-module joins keep working.
  #
  # Dev (ddl-auto: update) users should reset with DDL_AUTO=create-drop once,
  # since this changeset drops a large number of tables.
  # ---------------------------------------------------------------------------

  - changeSet:
      id: 056-drop-legacy-resource-tables
      author: bipros
      changes:
        - sql:
            comment: Drop all legacy resource subsystem tables (CASCADE handles FKs).
            sql: |
              DROP TABLE IF EXISTS resource.resource_role_assignments CASCADE;
              DROP TABLE IF EXISTS resource.resource_assignments      CASCADE;
              DROP TABLE IF EXISTS resource.resource_rates            CASCADE;
              DROP TABLE IF EXISTS resource.resource_curves           CASCADE;
              DROP TABLE IF EXISTS resource.user_resource_roles       CASCADE;
              DROP TABLE IF EXISTS resource.resources                 CASCADE;
              DROP TABLE IF EXISTS resource.resource_roles            CASCADE;
              DROP TABLE IF EXISTS resource.resource_type_defs        CASCADE;

  # ── Core 3-tier ────────────────────────────────────────────────────────────

  - changeSet:
      id: 056-create-resource-types
      author: bipros
      changes:
        - createTable:
            schemaName: resource
            tableName: resource_types
            columns:
              - column: { name: id,             type: UUID,         constraints: { primaryKey: true, nullable: false } }
              - column: { name: code,           type: VARCHAR(30),  constraints: { nullable: false, unique: true } }
              - column: { name: name,           type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: description,    type: VARCHAR(500) }
              - column: { name: sort_order,     type: INTEGER, defaultValueNumeric: 0,    constraints: { nullable: false } }
              - column: { name: active,         type: BOOLEAN, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: system_default, type: BOOLEAN, defaultValueBoolean: false, constraints: { nullable: false } }
              - column: { name: created_at,     type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: updated_at,     type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: created_by,     type: VARCHAR(255) }
              - column: { name: updated_by,     type: VARCHAR(255) }
              - column: { name: version,        type: BIGINT }
        - addUniqueConstraint:
            schemaName: resource
            tableName: resource_types
            columnNames: code
            constraintName: uk_resource_type_code
        - createIndex:
            schemaName: resource
            tableName: resource_types
            indexName: idx_resource_type_active_sort
            columns:
              - column: { name: active }
              - column: { name: sort_order }

  - changeSet:
      id: 056-seed-resource-types
      author: bipros
      changes:
        - sql:
            comment: Seed three system-default resource types.
            sql: |
              INSERT INTO resource.resource_types
                (id, code, name, description, sort_order, active, system_default,
                 created_at, updated_at, version)
              VALUES
                (gen_random_uuid(), 'LABOR',     'Labor',     'Human workforce',          10, true, true, now(), now(), 0),
                (gen_random_uuid(), 'EQUIPMENT', 'Equipment', 'Machines used in project', 20, true, true, now(), now(), 0),
                (gen_random_uuid(), 'MATERIAL',  'Material',  'Consumables or supplies',  30, true, true, now(), now(), 0)
              ON CONFLICT (code) DO NOTHING;

  - changeSet:
      id: 056-create-resource-roles
      author: bipros
      changes:
        - createTable:
            schemaName: resource
            tableName: resource_roles
            columns:
              - column: { name: id,                type: UUID,         constraints: { primaryKey: true, nullable: false } }
              - column: { name: code,              type: VARCHAR(50),  constraints: { nullable: false, unique: true } }
              - column: { name: name,              type: VARCHAR(100), constraints: { nullable: false } }
              - column: { name: description,       type: VARCHAR(500) }
              - column: { name: resource_type_id,  type: UUID,         constraints: { nullable: false } }
              - column: { name: productivity_unit, type: VARCHAR(50) }
              - column: { name: default_rate,      type: DECIMAL(19, 4) }
              - column: { name: sort_order,        type: INTEGER, defaultValueNumeric: 0,    constraints: { nullable: false } }
              - column: { name: active,            type: BOOLEAN, defaultValueBoolean: true, constraints: { nullable: false } }
              - column: { name: created_at,        type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: updated_at,        type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: created_by,        type: VARCHAR(255) }
              - column: { name: updated_by,        type: VARCHAR(255) }
              - column: { name: version,           type: BIGINT }
        - addUniqueConstraint:
            schemaName: resource
            tableName: resource_roles
            columnNames: code
            constraintName: uk_resource_role_code
        - addForeignKeyConstraint:
            baseTableSchemaName: resource
            baseTableName: resource_roles
            baseColumnNames: resource_type_id
            referencedTableSchemaName: resource
            referencedTableName: resource_types
            referencedColumnNames: id
            constraintName: fk_resource_role_type
        - createIndex:
            schemaName: resource
            tableName: resource_roles
            indexName: idx_resource_role_type
            columns:
              - column: { name: resource_type_id }

  - changeSet:
      id: 056-create-resources
      author: bipros
      changes:
        - createTable:
            schemaName: resource
            tableName: resources
            columns:
              - column: { name: id,               type: UUID,         constraints: { primaryKey: true, nullable: false } }
              - column: { name: code,             type: VARCHAR(50),  constraints: { nullable: false, unique: true } }
              - column: { name: name,             type: VARCHAR(150), constraints: { nullable: false } }
              - column: { name: description,      type: VARCHAR(1000) }
              - column: { name: role_id,          type: UUID,         constraints: { nullable: false } }
              - column: { name: resource_type_id, type: UUID,         constraints: { nullable: false } }
              - column: { name: availability,     type: DECIMAL(5, 2) }
              - column: { name: cost_per_unit,    type: DECIMAL(19, 4) }
              - column: { name: unit,             type: VARCHAR(30) }
              - column: { name: status,           type: VARCHAR(20), defaultValue: 'ACTIVE', constraints: { nullable: false } }
              - column: { name: calendar_id,      type: UUID }
              - column: { name: parent_id,        type: UUID }
              - column: { name: user_id,          type: UUID }
              - column: { name: sort_order,       type: INTEGER, defaultValueNumeric: 0, constraints: { nullable: false } }
              - column: { name: created_at,       type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: updated_at,       type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: created_by,       type: VARCHAR(255) }
              - column: { name: updated_by,       type: VARCHAR(255) }
              - column: { name: version,          type: BIGINT }
        - addUniqueConstraint:
            schemaName: resource
            tableName: resources
            columnNames: code
            constraintName: uk_resource_code
        - addForeignKeyConstraint:
            baseTableSchemaName: resource
            baseTableName: resources
            baseColumnNames: role_id
            referencedTableSchemaName: resource
            referencedTableName: resource_roles
            referencedColumnNames: id
            constraintName: fk_resource_role
        - addForeignKeyConstraint:
            baseTableSchemaName: resource
            baseTableName: resources
            baseColumnNames: resource_type_id
            referencedTableSchemaName: resource
            referencedTableName: resource_types
            referencedColumnNames: id
            constraintName: fk_resource_type
        - addForeignKeyConstraint:
            baseTableSchemaName: resource
            baseTableName: resources
            baseColumnNames: calendar_id
            referencedTableSchemaName: scheduling
            referencedTableName: calendars
            referencedColumnNames: id
            constraintName: fk_resource_calendar
        - createIndex:
            schemaName: resource
            tableName: resources
            indexName: idx_resource_role
            columns: [{ column: { name: role_id } }]
        - createIndex:
            schemaName: resource
            tableName: resources
            indexName: idx_resource_type
            columns: [{ column: { name: resource_type_id } }]
        - createIndex:
            schemaName: resource
            tableName: resources
            indexName: idx_resource_status
            columns: [{ column: { name: status } }]
        - createIndex:
            schemaName: resource
            tableName: resources
            indexName: idx_resource_parent
            columns: [{ column: { name: parent_id } }]
        - createIndex:
            schemaName: resource
            tableName: resources
            indexName: idx_resource_calendar
            columns: [{ column: { name: calendar_id } }]
        - createIndex:
            schemaName: resource
            tableName: resources
            indexName: idx_resource_user
            columns: [{ column: { name: user_id } }]

  # ── Equipment 1:1 detail ───────────────────────────────────────────────────

  - changeSet:
      id: 056-create-equipment-details
      author: bipros
      changes:
        - createTable:
            schemaName: resource
            tableName: resource_equipment_details
            columns:
              - column: { name: resource_id,             type: UUID, constraints: { primaryKey: true, nullable: false } }
              - column: { name: make,                    type: VARCHAR(80) }
              - column: { name: model,                   type: VARCHAR(80) }
              - column: { name: variant,                 type: VARCHAR(80) }
              - column: { name: manufacturer_name,       type: VARCHAR(120) }
              - column: { name: country_of_origin,       type: VARCHAR(60) }
              - column: { name: year_of_manufacture,     type: INTEGER }
              - column: { name: serial_number,           type: VARCHAR(80) }
              - column: { name: chassis_number,          type: VARCHAR(80) }
              - column: { name: engine_number,           type: VARCHAR(80) }
              - column: { name: registration_number,     type: VARCHAR(80) }
              - column: { name: capacity_spec,           type: VARCHAR(80) }
              - column: { name: fuel_litres_per_hour,    type: DECIMAL(10, 2) }
              - column: { name: standard_output_per_day, type: DECIMAL(15, 4) }
              - column: { name: standard_output_unit,    type: VARCHAR(30) }
              - column: { name: ownership_type,          type: VARCHAR(30) }
              - column: { name: quantity_available,      type: INTEGER }
              - column: { name: insurance_expiry,        type: DATE }
              - column: { name: last_service_date,       type: DATE }
              - column: { name: next_service_date,       type: DATE }
              - column: { name: created_at,              type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: updated_at,              type: TIMESTAMP WITH TIME ZONE, constraints: { nullable: false } }
              - column: { name: created_by,              type: VARCHAR(255) }
              - column: { name: updated_by,              type: VARCHAR(255) }
              - column: { name: version,                 type: BIGINT }
        - addForeignKeyConstraint:
            baseTableSchemaName: resource
            baseTableName: resource_equipment_details
            baseColumnNames: resource_id
            referencedTableSchemaName: resource
            referencedTableName: resources
            referencedColumnNames: id
            constraintName: fk_equipment_details_resource
            onDelete: CASCADE

  # ── Material 1:1 detail ────────────────────────────────────────────────────

  - changeSet:
      id: 056-create-material-details
      author: bipros
      changes:
        - createTable:
            schemaName: resource

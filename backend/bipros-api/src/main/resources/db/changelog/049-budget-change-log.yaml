databaseChangeLog:
  - changeSet:
      id: 049-create-budget-change-logs-table
      author: bipros
      changes:
        - createTable:
            schemaName: cost
            tableName: budget_change_logs
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: from_wbs_node_id
                  type: UUID
              - column:
                  name: to_wbs_node_id
                  type: UUID
              - column:
                  name: amount
                  type: DECIMAL(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: change_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  defaultValue: 'PENDING'
              - column:
                  name: reason
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: requested_by
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: decided_by
                  type: UUID
              - column:
                  name: requested_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: decided_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: version
                  type: BIGINT
        - addForeignKeyConstraint:
            baseSchemaName: cost
            baseTableName: budget_change_logs
            baseColumnNames: project_id
            referencedSchemaName: project
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_budget_change_logs_project

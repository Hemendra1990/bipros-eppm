databaseChangeLog:
  - changeSet:
      id: 051-create-analytics-audit-log
      author: bipros
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: analytics
                tableName: analytics_audit_log
      changes:
        - createTable:
            schemaName: analytics
            tableName: analytics_audit_log
            columns:
              - column: { name: id,                  type: UUID,         constraints: { primaryKey: true, nullable: false } }
              - column: { name: user_id,             type: UUID,         constraints: { nullable: false } }
              - column: { name: query_text,          type: TEXT,         constraints: { nullable: false } }
              - column: { name: project_context_id,  type: UUID }
              - column: { name: llm_provider,        type: VARCHAR(32) }
              - column: { name: llm_model,           type: VARCHAR(128) }
              - column: { name: tool_called,         type: VARCHAR(64) }
              - column: { name: tool_args_json,      type: TEXT }
              - column: { name: sql_executed,        type: TEXT }
              - column: { name: sql_hash,            type: VARCHAR(64) }
              - column: { name: result_row_count,    type: INTEGER }
              - column: { name: result_hash,         type: VARCHAR(64) }
              - column: { name: narrative_returned,  type: TEXT }
              - column: { name: tokens_input,        type: INTEGER }
              - column: { name: tokens_output,       type: INTEGER }
              - column: { name: cost_micros,         type: BIGINT }
              - column: { name: latency_ms,          type: INTEGER }
              - column: { name: status,              type: VARCHAR(16),  constraints: { nullable: false } }
              - column: { name: error_kind,          type: VARCHAR(64) }
              - column: { name: request_id,          type: VARCHAR(64) }
              - column: { name: created_at,          type: TIMESTAMP,    constraints: { nullable: false } }
              - column: { name: updated_at,          type: TIMESTAMP,    constraints: { nullable: false } }
              - column: { name: created_by,          type: VARCHAR(255) }
              - column: { name: updated_by,          type: VARCHAR(255) }
              - column: { name: version,             type: BIGINT,       constraints: { nullable: false }, defaultValueNumeric: 0 }
        - createIndex:
            schemaName: analytics
            tableName: analytics_audit_log
            indexName: idx_audit_user_created
            columns:
              - column: { name: user_id }
              - column: { name: created_at, descending: true }
        - createIndex:
            schemaName: analytics
            tableName: analytics_audit_log
            indexName: idx_audit_status
            columns:
              - column: { name: status }

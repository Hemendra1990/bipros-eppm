              - column:
                  name: actual_cost
                  type: DECIMAL(19, 4)
              - column:
                  name: remaining_cost
                  type: DECIMAL(19, 4)
              - column:
                  name: at_completion_cost
                  type: DECIMAL(19, 4)
              - column:
                  name: rate_type
                  type: VARCHAR(50)
              - column:
                  name: resource_curve_id
                  type: UUID
              - column:
                  name: planned_start_date
                  type: DATE
              - column:
                  name: planned_finish_date
                  type: DATE
              - column:
                  name: actual_start_date
                  type: DATE
              - column:
                  name: actual_finish_date
                  type: DATE
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: version
                  type: BIGINT
        - createIndex:
            schemaName: resource
            tableName: resource_assignments
            indexName: idx_assignment_activity_id
            columns:
              - column:

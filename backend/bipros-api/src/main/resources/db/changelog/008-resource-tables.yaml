        - createIndex:
            schemaName: resource
            tableName: resource_assignments
            indexName: idx_assignment_resource_id
            columns:
              - column:
                  name: resource_id
        - createIndex:
            schemaName: resource
            tableName: resource_assignments
            indexName: idx_assignment_project_id
            columns:
              - column:
                  name: project_id
        - createIndex:
            schemaName: resource
            tableName: resource_assignments
            indexName: idx_assignment_planned_start_date
            columns:
              - column:
                  name: planned_start_date
        - createIndex:
            schemaName: resource
            tableName: resource_assignments
            indexName: idx_assignment_planned_finish_date
            columns:
              - column:
                  name: planned_finish_date
        - addUniqueConstraint:
            schemaName: resource
            tableName: resource_assignments
            columnNames: activity_id,resource_id
            constraintName: uk_assignment_activity_resource
        - addForeignKeyConstraint:
            baseSchemaName: resource
            baseTableName: resource_assignments
            baseColumnNames: activity_id
            referencedSchemaName: activity
            referencedTableName: activities
            referencedColumnNames: id
            constraintName: fk_resource_assignments_activity
        - addForeignKeyConstraint:
            baseSchemaName: resource
            baseTableName: resource_assignments
            baseColumnNames: resource_id
            referencedSchemaName: resource
            referencedTableName: resources
            referencedColumnNames: id
            constraintName: fk_resource_assignments_resource
        - addForeignKeyConstraint:
            baseSchemaName: resource
            baseTableName: resource_assignments
            baseColumnNames: project_id
            referencedSchemaName: project
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_resource_assignments_project

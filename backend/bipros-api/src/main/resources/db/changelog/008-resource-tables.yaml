databaseChangeLog:
  - changeSet:
      id: 008-create-resources-table
      author: bipros
      changes:
        - createTable:
            schemaName: resource
            tableName: resources
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: resource_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: UUID
              - column:
                  name: calendar_id
                  type: UUID
              - column:
                  name: email
                  type: VARCHAR(100)
              - column:
                  name: phone
                  type: VARCHAR(20)
              - column:
                  name: title
                  type: VARCHAR(100)
              - column:
                  name: max_units_per_day
                  type: DOUBLE
                  constraints:
                    nullable: false
                  defaultValue: 8.0
              - column:
                  name: default_units_per_time
                  type: DOUBLE
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
                  defaultValue: 'ACTIVE'
              - column:
                  name: sort_order
                  type: INTEGER
                  constraints:
                    nullable: false
                  defaultValue: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: version
                  type: BIGINT
        - createIndex:
            schemaName: resource
            tableName: resources
            indexName: idx_resource_type
            columns:
              - column:
                  name: resource_type
        - createIndex:
            schemaName: resource
            tableName: resources
            indexName: idx_resource_status
            columns:
              - column:
                  name: status
        - createIndex:
            schemaName: resource
            tableName: resources
            indexName: idx_resource_parent_id
            columns:
              - column:
                  name: parent_id
        - createIndex:
            schemaName: resource
            tableName: resources
            indexName: idx_resource_calendar_id
            columns:
              - column:
                  name: calendar_id
        - addUniqueConstraint:
            schemaName: resource
            tableName: resources
            columnNames: code
            constraintName: uk_resource_code
        - addForeignKeyConstraint:
            baseSchemaName: resource
            baseTableName: resources
            baseColumnNames: calendar_id
            referencedSchemaName: scheduling
            referencedTableName: calendars
            referencedColumnNames: id
            constraintName: fk_resources_calendar

  - changeSet:
      id: 008-create-resource-rates-table
      author: bipros
      changes:
        - createTable:
            schemaName: resource
            tableName: resource_rates
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: resource_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: rate_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: price_per_unit
                  type: DECIMAL(19, 4)
                  constraints:
                    nullable: false
              - column:
                  name: effective_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: max_units_per_time
                  type: DOUBLE
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: version
                  type: BIGINT
        - createIndex:
            schemaName: resource
            tableName: resource_rates
            indexName: idx_rate_resource_id
            columns:
              - column:
                  name: resource_id
        - createIndex:
            schemaName: resource
            tableName: resource_rates
            indexName: idx_rate_type
            columns:
              - column:
                  name: rate_type
        - createIndex:
            schemaName: resource
            tableName: resource_rates
            indexName: idx_rate_effective_date
            columns:
              - column:
                  name: effective_date
        - addUniqueConstraint:
            schemaName: resource
            tableName: resource_rates
            columnNames: resource_id,rate_type,effective_date
            constraintName: uk_resource_rate_type_date
        - addForeignKeyConstraint:
            baseSchemaName: resource
            baseTableName: resource_rates
            baseColumnNames: resource_id
            referencedSchemaName: resource
            referencedTableName: resources
            referencedColumnNames: id
            constraintName: fk_resource_rates_resource

  - changeSet:
      id: 008-create-resource-curves-table
      author: bipros
      changes:
        - createTable:
            schemaName: resource
            tableName: resource_curves
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: is_default
                  type: BOOLEAN
                  constraints:
                    nullable: false
                  defaultValueBoolean: false
              - column:
                  name: curve_data
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: version
                  type: BIGINT
        - createIndex:
            schemaName: resource
            tableName: resource_curves
            indexName: idx_curve_is_default
            columns:
              - column:
                  name: is_default
        - addUniqueConstraint:
            schemaName: resource
            tableName: resource_curves
            columnNames: name
            constraintName: uk_resource_curve_name

  - changeSet:
      id: 008-create-resource-assignments-table
      author: bipros
      changes:
        - createTable:
            schemaName: resource
            tableName: resource_assignments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: activity_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: resource_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: role_id
                  type: UUID
              - column:
                  name: project_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: planned_units
                  type: DOUBLE
              - column:
                  name: actual_units
                  type: DOUBLE
              - column:
                  name: remaining_units
                  type: DOUBLE
              - column:
                  name: at_completion_units
                  type: DOUBLE
              - column:
                  name: planned_cost

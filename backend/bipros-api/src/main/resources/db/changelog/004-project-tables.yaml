              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: version
                  type: BIGINT

  - changeSet:
      id: 004-create-wbs-nodes-table
      author: bipros
      changes:
        - createTable:
            schemaName: project
            tableName: wbs_nodes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: UUID
              - column:
                  name: project_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: obs_node_id
                  type: UUID
              - column:
                  name: sort_order
                  type: INTEGER
                  constraints:
                    nullable: false
                  defaultValue: 0
              - column:
                  name: summary_duration
                  type: DOUBLE
              - column:
                  name: summary_percent_complete
                  type: DOUBLE
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: version
                  type: BIGINT
        - addForeignKeyConstraint:
            baseSchemaName: project
            baseTableName: projects
            baseColumnNames: eps_node_id
            referencedSchemaName: project
            referencedTableName: eps_nodes
            referencedColumnNames: id
            constraintName: fk_projects_eps_node
        - addForeignKeyConstraint:
            baseSchemaName: project
            baseTableName: wbs_nodes
            baseColumnNames: project_id
            referencedSchemaName: project
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_wbs_nodes_project

databaseChangeLog:
  - changeSet:
      id: 004-create-eps-nodes-table
      author: bipros
      changes:
        - createTable:
            schemaName: project
            tableName: eps_nodes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: UUID
              - column:
                  name: obs_id
                  type: UUID
              - column:
                  name: sort_order
                  type: INTEGER
                  constraints:
                    nullable: false
                  defaultValue: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: version
                  type: BIGINT
        - addUniqueConstraint:
            schemaName: project
            tableName: eps_nodes
            columnNames: code
            constraintName: uk_eps_nodes_code

  - changeSet:
      id: 004-create-obs-nodes-table
      author: bipros
      changes:
        - createTable:
            schemaName: project
            tableName: obs_nodes
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: parent_id
                  type: UUID
              - column:
                  name: description
                  type: VARCHAR(500)
              - column:
                  name: sort_order
                  type: INTEGER
                  constraints:
                    nullable: false
                  defaultValue: 0
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: version
                  type: BIGINT
        - addUniqueConstraint:
            schemaName: project
            tableName: obs_nodes
            columnNames: code
            constraintName: uk_obs_nodes_code

  - changeSet:
      id: 004-create-projects-table
      author: bipros
      changes:
        - createTable:
            schemaName: project
            tableName: projects
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: eps_node_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: obs_node_id
                  type: UUID
              - column:
                  name: planned_start_date
                  type: DATE
              - column:
                  name: planned_finish_date
                  type: DATE
              - column:
                  name: data_date

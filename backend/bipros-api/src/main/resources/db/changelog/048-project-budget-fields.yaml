databaseChangeLog:
  - changeSet:
      id: 048-add-project-budget-fields
      author: bipros
      changes:
        - addColumn:
            schemaName: project
            tableName: projects
            columns:
              - column:
                  name: original_budget
                  type: DECIMAL(19, 2)
              - column:
                  name: current_budget
                  type: DECIMAL(19, 2)
              - column:
                  name: budget_currency
                  type: VARCHAR(3)
                  defaultValue: 'INR'
              - column:
                  name: budget_updated_at
                  type: TIMESTAMP

databaseChangeLog:
  - changeSet:
      id: 038-create-risk-activity-assignments
      author: bipros
      changes:
        - createTable:
            schemaName: risk
            tableName: risk_activity_assignments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: risk_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: activity_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: VARCHAR(255)
              - column:
                  name: updated_by
                  type: VARCHAR(255)
              - column:
                  name: version
                  type: BIGINT
        - addUniqueConstraint:
            schemaName: risk
            tableName: risk_activity_assignments
            columnNames: risk_id, activity_id
            constraintName: uk_risk_activity_assignment
        - addForeignKeyConstraint:
            baseSchemaName: risk
            baseTableName: risk_activity_assignments
            baseColumnNames: risk_id
            referencedSchemaName: risk
            referencedTableName: risks
            referencedColumnNames: id
            constraintName: fk_risk_activity_assignments_risk
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseSchemaName: risk
            baseTableName: risk_activity_assignments
            baseColumnNames: project_id
            referencedSchemaName: project
            referencedTableName: projects
            referencedColumnNames: id
            constraintName: fk_risk_activity_assignments_project
            onDelete: CASCADE
        - createIndex:
            schemaName: risk
            tableName: risk_activity_assignments
            indexName: idx_risk_activity_assignments_risk
            columns:
              - column:
                  name: risk_id
        - createIndex:
            schemaName: risk
            tableName: risk_activity_assignments
            indexName: idx_risk_activity_assignments_activity
            columns:
              - column:
                  name: activity_id
        - createIndex:
            schemaName: risk
            tableName: risk_activity_assignments
            indexName: idx_risk_activity_assignments_project
            columns:
              - column:
                  name: project_id

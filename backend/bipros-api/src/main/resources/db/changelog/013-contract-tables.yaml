databaseChangeLog:
  - changeSet:
      id: 013-create-contract-tables
      author: bipros
      changes:
        # ============================================================ contracts
        - createTable:
            tableName: contracts
            schemaName: contract
            columns:
              - column: { name: id,                          type: UUID,           constraints: { primaryKey: true, nullable: false } }
              - column: { name: project_id,                  type: UUID,           constraints: { nullable: false } }
              - column: { name: tender_id,                   type: UUID }
              - column: { name: contract_number,             type: VARCHAR(50),    constraints: { nullable: false, unique: true } }
              - column: { name: loa_number,                  type: VARCHAR(50),    constraints: { unique: true } }
              - column: { name: contractor_name,             type: VARCHAR(200),   constraints: { nullable: false } }
              - column: { name: contractor_code,             type: VARCHAR(50) }
              - column: { name: contract_value,              type: DECIMAL(15, 2) }
              - column: { name: revised_value,               type: DECIMAL(15, 2) }
              - column: { name: loa_date,                    type: DATE }
              - column: { name: start_date,                  type: DATE }
              - column: { name: completion_date,             type: DATE }
              - column: { name: dlp_months,                  type: INT,            defaultValue: "12" }
              - column: { name: ld_rate,                     type: DOUBLE PRECISION }
              - column: { name: status,                      type: VARCHAR(50),    defaultValue: DRAFT, constraints: { nullable: false } }
              - column: { name: contract_type,               type: VARCHAR(50),    constraints: { nullable: false } }
              # P6/PCM-inspired commercial fields
              - column: { name: description,                 type: TEXT }
              - column: { name: currency,                    type: VARCHAR(3),     defaultValue: INR, constraints: { nullable: false } }
              - column: { name: ntp_date,                    type: DATE }
              - column: { name: revised_completion_date,     type: DATE }
              - column: { name: mobilisation_advance_pct,    type: DECIMAL(5, 2) }
              - column: { name: retention_pct,               type: DECIMAL(5, 2) }
              - column: { name: performance_bg_pct,          type: DECIMAL(5, 2) }
              - column: { name: payment_terms_days,          type: INT }
              - column: { name: billing_cycle,               type: VARCHAR(30) }
              # IC-PMS denormalised KPI fields (refreshed by ContractKpiService)
              - column: { name: wbs_package_code,            type: VARCHAR(60) }
              - column: { name: package_description,         type: VARCHAR(300) }
              - column: { name: actual_completion_date,      type: DATE }
              - column: { name: spi,                         type: DECIMAL(6, 3) }
              - column: { name: cpi,                         type: DECIMAL(6, 3) }
              - column: { name: physical_progress_ai,        type: DECIMAL(5, 2) }
              - column: { name: cumulative_ra_bills_crores,  type: DECIMAL(14, 2) }
              - column: { name: vo_numbers_issued,           type: INT }
              - column: { name: vo_value_crores,             type: DECIMAL(14, 2) }
              - column: { name: performance_score,           type: DECIMAL(5, 2) }
              - column: { name: bg_expiry,                   type: DATE }
              - column: { name: kpi_refreshed_at,            type: TIMESTAMP WITH TIME ZONE }
              # BaseEntity audit columns
              - column: { name: created_at,                  type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: updated_at,                  type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: created_by,                  type: VARCHAR(100) }
              - column: { name: updated_by,                  type: VARCHAR(100) }
              - column: { name: version,                     type: BIGINT }

        - createIndex:
            tableName: contracts
            schemaName: contract
            indexName: idx_contract_project
            columns:
              - column: { name: project_id }

        - createIndex:
            tableName: contracts
            schemaName: contract
            indexName: idx_contract_number
            columns:
              - column: { name: contract_number }

        # ============================================================ contract_milestones
        - createTable:
            tableName: contract_milestones
            schemaName: contract
            columns:
              - column: { name: id,                  type: UUID,           constraints: { primaryKey: true, nullable: false } }
              - column: { name: contract_id,         type: UUID,           constraints: { nullable: false, foreignKeyName: fk_milestone_contract, references: "contract.contracts(id)" } }
              - column: { name: milestone_code,      type: VARCHAR(50) }
              - column: { name: milestone_name,      type: VARCHAR(200),   constraints: { nullable: false } }
              - column: { name: target_date,         type: DATE }
              - column: { name: actual_date,         type: DATE }
              - column: { name: payment_percentage,  type: DOUBLE PRECISION }
              - column: { name: amount,              type: DECIMAL(15, 2) }
              - column: { name: status,              type: VARCHAR(50),    defaultValue: PENDING, constraints: { nullable: false } }
              - column: { name: created_at,          type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: updated_at,          type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: created_by,          type: VARCHAR(100) }
              - column: { name: updated_by,          type: VARCHAR(100) }
              - column: { name: version,             type: BIGINT }

        - createIndex:
            tableName: contract_milestones
            schemaName: contract
            indexName: idx_milestone_contract
            columns:
              - column: { name: contract_id }

        # ============================================================ variation_orders
        - createTable:
            tableName: variation_orders
            schemaName: contract
            columns:
              - column: { name: id,                       type: UUID,           constraints: { primaryKey: true, nullable: false } }
              - column: { name: contract_id,              type: UUID,           constraints: { nullable: false, foreignKeyName: fk_vo_contract, references: "contract.contracts(id)" } }
              - column: { name: vo_number,                type: VARCHAR(50),    constraints: { nullable: false } }
              - column: { name: description,              type: TEXT }
              - column: { name: vo_value,                 type: DECIMAL(15, 2) }
              - column: { name: justification,            type: TEXT }
              - column: { name: status,                   type: VARCHAR(50),    defaultValue: INITIATED, constraints: { nullable: false } }
              - column: { name: impact_on_budget,         type: DECIMAL(15, 2) }
              - column: { name: impact_on_schedule_days,  type: INT }
              - column: { name: approved_by,              type: VARCHAR(100) }
              - column: { name: approved_at,              type: TIMESTAMP }
              - column: { name: created_at,               type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: updated_at,               type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: created_by,               type: VARCHAR(100) }
              - column: { name: updated_by,               type: VARCHAR(100) }
              - column: { name: version,                  type: BIGINT }

        - createIndex:
            tableName: variation_orders
            schemaName: contract
            indexName: idx_vo_contract
            columns:
              - column: { name: contract_id }

        # ============================================================ performance_bonds
        - createTable:
            tableName: performance_bonds
            schemaName: contract
            columns:
              - column: { name: id,            type: UUID,           constraints: { primaryKey: true, nullable: false } }
              - column: { name: contract_id,   type: UUID,           constraints: { nullable: false, foreignKeyName: fk_bond_contract, references: "contract.contracts(id)" } }
              - column: { name: bond_type,     type: VARCHAR(50),    constraints: { nullable: false } }
              - column: { name: bond_value,    type: DECIMAL(15, 2) }
              - column: { name: bank_name,     type: VARCHAR(200) }
              - column: { name: issue_date,    type: DATE }
              - column: { name: expiry_date,   type: DATE }
              - column: { name: status,        type: VARCHAR(50),    defaultValue: ACTIVE, constraints: { nullable: false } }
              - column: { name: created_at,    type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: updated_at,    type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: created_by,    type: VARCHAR(100) }
              - column: { name: updated_by,    type: VARCHAR(100) }
              - column: { name: version,       type: BIGINT }

        - createIndex:
            tableName: performance_bonds
            schemaName: contract
            indexName: idx_bond_contract
            columns:
              - column: { name: contract_id }

        # ============================================================ contractor_scorecards
        - createTable:
            tableName: contractor_scorecards
            schemaName: contract
            columns:
              - column: { name: id,                          type: UUID,           constraints: { primaryKey: true, nullable: false } }
              - column: { name: contract_id,                 type: UUID,           constraints: { nullable: false, foreignKeyName: fk_scorecard_contract, references: "contract.contracts(id)" } }
              - column: { name: period,                      type: VARCHAR(50),    constraints: { nullable: false } }
              - column: { name: quality_score,               type: DOUBLE PRECISION }
              - column: { name: safety_score,                type: DOUBLE PRECISION }
              - column: { name: progress_score,              type: DOUBLE PRECISION }
              - column: { name: payment_compliance_score,    type: DOUBLE PRECISION }
              - column: { name: overall_score,               type: DOUBLE PRECISION }
              - column: { name: remarks,                     type: TEXT }
              - column: { name: created_at,                  type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: updated_at,                  type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: created_by,                  type: VARCHAR(100) }
              - column: { name: updated_by,                  type: VARCHAR(100) }
              - column: { name: version,                     type: BIGINT }

        - createIndex:
            tableName: contractor_scorecards
            schemaName: contract
            indexName: idx_scorecard_contract
            columns:
              - column: { name: contract_id }

        # ============================================================ procurement_plans
        - createTable:
            tableName: procurement_plans
            schemaName: contract
            columns:
              - column: { name: id,                  type: UUID,           constraints: { primaryKey: true, nullable: false } }
              - column: { name: project_id,          type: UUID,           constraints: { nullable: false } }
              - column: { name: wbs_node_id,         type: UUID }
              - column: { name: plan_code,           type: VARCHAR(50),    constraints: { nullable: false, unique: true } }
              - column: { name: description,         type: TEXT }
              - column: { name: procurement_method,  type: VARCHAR(50),    constraints: { nullable: false } }
              - column: { name: estimated_value,     type: DECIMAL(15, 2) }
              - column: { name: currency,            type: VARCHAR(3),     defaultValue: INR }
              - column: { name: target_nit_date,     type: DATE }
              - column: { name: target_award_date,   type: DATE }
              - column: { name: status,              type: VARCHAR(50),    defaultValue: DRAFT, constraints: { nullable: false } }
              - column: { name: approval_level,      type: VARCHAR(50) }
              - column: { name: approved_by,         type: VARCHAR(100) }
              - column: { name: approved_at,         type: TIMESTAMP }
              - column: { name: created_at,          type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: updated_at,          type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: created_by,          type: VARCHAR(100) }
              - column: { name: updated_by,          type: VARCHAR(100) }
              - column: { name: version,             type: BIGINT }

        - createIndex:
            tableName: procurement_plans
            schemaName: contract
            indexName: idx_proc_plan_project
            columns:
              - column: { name: project_id }

        # ============================================================ tenders
        - createTable:
            tableName: tenders
            schemaName: contract
            columns:
              - column: { name: id,                       type: UUID,           constraints: { primaryKey: true, nullable: false } }
              - column: { name: procurement_plan_id,      type: UUID,           constraints: { nullable: false } }
              - column: { name: project_id,               type: UUID,           constraints: { nullable: false } }
              - column: { name: tender_number,            type: VARCHAR(50),    constraints: { nullable: false, unique: true } }
              - column: { name: nit_date,                 type: DATE }
              - column: { name: scope,                    type: TEXT }
              - column: { name: estimated_value,          type: DECIMAL(15, 2) }
              - column: { name: emd_amount,               type: DECIMAL(15, 2) }
              - column: { name: completion_period_days,   type: INT }
              - column: { name: bid_due_date,             type: DATE }
              - column: { name: bid_open_date,            type: DATE }
              - column: { name: status,                   type: VARCHAR(50),    defaultValue: DRAFT, constraints: { nullable: false } }
              - column: { name: awarded_contract_id,      type: UUID }
              - column: { name: created_at,               type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: updated_at,               type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: created_by,               type: VARCHAR(100) }
              - column: { name: updated_by,               type: VARCHAR(100) }
              - column: { name: version,                  type: BIGINT }

        - createIndex:
            tableName: tenders
            schemaName: contract
            indexName: idx_tender_project
            columns:
              - column: { name: project_id }

        - createIndex:
            tableName: tenders
            schemaName: contract
            indexName: idx_tender_proc_plan
            columns:
              - column: { name: procurement_plan_id }

        # ============================================================ bid_submissions
        - createTable:
            tableName: bid_submissions
            schemaName: contract
            columns:
              - column: { name: id,                  type: UUID,           constraints: { primaryKey: true, nullable: false } }
              - column: { name: tender_id,           type: UUID,           constraints: { nullable: false } }
              - column: { name: bidder_name,         type: VARCHAR(200),   constraints: { nullable: false } }
              - column: { name: bidder_code,         type: VARCHAR(50) }
              - column: { name: technical_score,     type: DOUBLE PRECISION }
              - column: { name: financial_bid,       type: DECIMAL(15, 2) }
              - column: { name: status,              type: VARCHAR(50),    defaultValue: SUBMITTED, constraints: { nullable: false } }
              - column: { name: evaluation_remarks,  type: TEXT }
              - column: { name: created_at,          type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: updated_at,          type: TIMESTAMP,      constraints: { nullable: false } }
              - column: { name: created_by,          type: VARCHAR(100) }
              - column: { name: updated_by,          type: VARCHAR(100) }
              - column: { name: version,             type: BIGINT }

        - createIndex:
            tableName: bid_submissions
            schemaName: contract
            indexName: idx_bid_tender
            columns:
              - column: { name: tender_id }

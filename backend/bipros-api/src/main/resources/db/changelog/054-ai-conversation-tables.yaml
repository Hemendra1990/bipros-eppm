databaseChangeLog:
  - changeSet:
      id: 054-ai-conversation-tables
      author: bipros
      changes:
        - createTable:
            schemaName: ai
            tableName: ai_conversations
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
              - column:
                  name: project_id
                  type: UUID
              - column:
                  name: module
                  type: VARCHAR(50)
              - column:
                  name: title
                  type: VARCHAR(255)
              - column:
                  name: started_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
              - column:
                  name: last_message_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
              - column:
                  name: deleted_at
                  type: TIMESTAMPTZ
        - createIndex:
            schemaName: ai
            tableName: ai_conversations
            indexName: idx_ai_conv_user
            columns:
              - column:
                  name: user_id
              - column:
                  name: deleted_at
        - createIndex:
            schemaName: ai
            tableName: ai_conversations
            indexName: idx_ai_conv_project
            columns:
              - column:
                  name: project_id
        - createTable:
            schemaName: ai
            tableName: ai_messages
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: conversation_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: seq
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
              - column:
                  name: tool_calls
                  type: JSONB
              - column:
                  name: tokens_in
                  type: INT
              - column:
                  name: tokens_out
                  type: INT
              - column:
                  name: model
                  type: VARCHAR(200)
              - column:
                  name: provider_id
                  type: UUID
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
        - createIndex:
            schemaName: ai
            tableName: ai_messages
            indexName: idx_ai_msg_conv
            columns:
              - column:
                  name: conversation_id
              - column:
                  name: seq
        - createTable:
            schemaName: ai
            tableName: ai_tool_calls
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: tool_name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: input
                  type: JSONB
              - column:
                  name: output
                  type: JSONB
              - column:
                  name: latency_ms
                  type: INT
              - column:
                  name: status
                  type: VARCHAR(20)
              - column:
                  name: error
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: NOW()
        - createIndex:
            schemaName: ai
            tableName: ai_tool_calls
            indexName: idx_ai_tool_msg
            columns:
              - column:
                  name: message_id
